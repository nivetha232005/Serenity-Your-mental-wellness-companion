<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Serenity — Mental Health Companion</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cream:   #fdf6ee;
      --sand:    #e8ddd0;
      --blush:   #e8c4b0;
      --terracotta: #c4714a;
      --rust:    #a0522d;
      --sage:    #7a9e8e;
      --deep:    #2d2520;
      --muted:   #7a6a60;
      --bubble-user: #c4714a;
      --bubble-bot:  #ffffff;
      --radius:  18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--deep);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Decorative background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #e8c4b0, #c4714a44);
      top: -100px; right: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #b5ccbf, #7a9e8e44);
      bottom: -80px; left: -80px;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 24px;
      animation: fadeDown 0.7s ease both;
    }
    .logo-ring {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blush), var(--terracotta));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
      box-shadow: 0 4px 18px #c4714a33;
    }
    .logo-ring svg { width: 28px; height: 28px; fill: white; }
    h1 {
      font-family: 'Lora', serif;
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--deep);
    }
    .tagline {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Name input ── */
    .name-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      animation: fadeUp 0.7s 0.1s ease both;
    }
    .name-row input {
      flex: 1;
      padding: 10px 16px;
      border-radius: 50px;
      border: 1.5px solid var(--sand);
      background: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--deep);
      outline: none;
      transition: border-color 0.2s;
    }
    .name-row input:focus { border-color: var(--terracotta); }
    .name-row input::placeholder { color: #b0a090; }

    /* ── Chat window ── */
    .chat-card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 8px 40px #2d252012, 0 2px 8px #2d250808;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: fadeUp 0.7s 0.2s ease both;
    }

    .messages {
      padding: 22px 18px;
      min-height: 320px;
      max-height: 400px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 4px; }

    /* Welcome message */
    .welcome {
      text-align: center;
      padding: 24px 12px;
      color: var(--muted);
    }
    .welcome .icon { font-size: 2rem; margin-bottom: 8px; }
    .welcome p {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* Bubbles */
    .bubble-wrap {
      display: flex;
      flex-direction: column;
      max-width: 82%;
      animation: bubbleIn 0.35s ease both;
    }
    .bubble-wrap.user { align-self: flex-end; align-items: flex-end; }
    .bubble-wrap.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 11px 16px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      line-height: 1.55;
    }
    .bubble-wrap.user .bubble {
      background: linear-gradient(135deg, var(--terracotta), var(--rust));
      color: white;
      border-bottom-right-radius: 4px;
    }
    .bubble-wrap.bot .bubble {
      background: var(--cream);
      color: var(--deep);
      border: 1.5px solid var(--sand);
      border-bottom-left-radius: 4px;
    }
    .bubble-label {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    /* Typing indicator */
    .typing .bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 14px 18px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.1s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    /* ── Input area ── */
    .input-area {
      display: flex;
      gap: 10px;
      padding: 14px 16px;
      border-top: 1.5px solid #f0e8e0;
      background: #fdfaf7;
    }
    .input-area textarea {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--sand);
      border-radius: 14px;
      padding: 10px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--deep);
      background: white;
      outline: none;
      line-height: 1.4;
      transition: border-color 0.2s;
      min-height: 44px;
      max-height: 120px;
      overflow-y: auto;
    }
    .input-area textarea:focus { border-color: var(--terracotta); }
    .input-area textarea::placeholder { color: #b0a090; }

    .send-btn {
      width: 44px; height: 44px;
      flex-shrink: 0;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--terracotta), var(--rust));
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 12px #c4714a44;
      transition: transform 0.15s, box-shadow 0.15s;
      align-self: flex-end;
    }
    .send-btn:hover { transform: scale(1.08); box-shadow: 0 5px 18px #c4714a55; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 18px; height: 18px; fill: white; }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: scale(0.92) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo-ring">
      <!-- Leaf/heart icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402C1 3.518 3.467 2 6 2c1.984 0 3.94 1.012 5 2.67C12.06 3.012 14.016 2 16 2c2.533 0 5 1.518 5 5.191 0 4.105-5.37 8.863-11 14.402z"/>
      </svg>
    </div>
    <h1>Serenity</h1>
    <p class="tagline">Your mental wellness companion</p>
  </header>

  <div class="name-row">
    <input type="text" id="nameInput" placeholder="Your first name (optional)" maxlength="40"/>
  </div>

  <div class="chat-card">
    <div class="messages" id="messages">
      <div class="welcome">
        <div class="icon">🌿</div>
        <p>Hello, I'm here for you.<br>Share what's on your mind.</p>
      </div>
    </div>

    <div class="input-area">
      <textarea id="msgInput" placeholder="How are you feeling today…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const msgInput   = document.getElementById('msgInput');
  const sendBtn    = document.getElementById('sendBtn');
  const nameInput  = document.getElementById('nameInput');

  // Auto-resize textarea
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  });

  // Send on Enter (Shift+Enter for newline)
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);

  function addBubble(text, role) {
    // Remove welcome message on first chat
    const welcome = messagesEl.querySelector('.welcome');
    if (welcome) welcome.remove();

    const wrap = document.createElement('div');
    wrap.className = `bubble-wrap ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const label = document.createElement('div');
    label.className = 'bubble-label';
    label.textContent = role === 'user' ? 'You' : 'Serenity';

    wrap.appendChild(bubble);
    wrap.appendChild(label);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function addTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap bot typing';
    wrap.innerHTML = `<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text) return;

    addBubble(text, 'user');
    msgInput.value = '';
    msgInput.style.height = 'auto';
    sendBtn.disabled = true;

    const typing = addTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          name: nameInput.value.trim() || 'there'
        })
      });
      const data = await res.json();
      typing.remove();
      addBubble(data.reply || 'Sorry, something went wrong.', 'bot');
    } catch (err) {
      typing.remove();
      addBubble('Network error. Please try again.', 'bot');
    } finally {
      sendBtn.disabled = false;
      msgInput.focus();
    }
  }
</script>
</body>
</html>
